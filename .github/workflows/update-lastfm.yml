name: Update Last.fm Top Artist

on:
  schedule:
    # Runs daily at 6:00 AM UTC
    - cron: '0 6 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  update-lastfm:
    # Skip if this workflow was triggered by a push event from its own commit
    # (This is a safety measure in case push triggers are added later)
    if: |
      github.event_name != 'push' || (
        github.event.head_commit.author.name != 'github-actions[bot]' &&
        !startsWith(github.event.head_commit.message, 'Update Last.fm top artist')
      )
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3.5"

      - name: Install dependencies
        run: gem install httparty

      - name: Fetch Last.fm top artist
        env:
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          LASTFM_USER: uilydna
        run: ruby .github/scripts/update-lastfm.rb

      - name: Commit and push if changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add _data/lastfm.yml
          if ! git diff --cached --quiet; then
            git commit -m "Update Last.fm top artist"
            git push
            echo "✅ Last.fm data updated and committed"
          else
            echo "ℹ️ No changes to commit - data unchanged"
          fi
